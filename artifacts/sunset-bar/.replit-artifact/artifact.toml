kind = "web"
previewPath = "/"
title = "Sunset Bar"
version = "1.0.0"
id = "artifacts/sunset-bar"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20493

[services.development]
run = "pnpm --filter @workspace/sunset-bar run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sunset-bar", "run", "build" ]
publicDir = "artifacts/sunset-bar/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20493"
BASE_PATH = "/"
